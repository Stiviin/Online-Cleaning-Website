<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    
<div class="container">
    <div class="checkoutLayout">

        
        <div class="returnCart">
            <img id="i1" src="imag1.jpg" height=90 width=90><a href="main.html" class="logo">Essyklyn</a>
            <h1>Cart List</h1>
            <div class="list">

                <div class="item">
                    <img src="soap.webp">
                    <div class="info">
                        <div class="name">PRODUCT 1</div>
                        <div class="price">$22/1 product</div>
                    </div>
                    <div class="quantity">5</div>
                    <div class="returnPrice">$433.3</div>
                </div>

            </div>
        </div>


        <div class="right">
            <h1>Checkout</h1>

            <div class="form">
                <div class="group">
                    <label for="name">First Name</label>
                    <input type="text" name="name" id="name">
                </div>
                
                
                
                <div class="group">
                    <label for="address">Email</label>
                    <input type="text" name="address" id="address">
                </div>
    
                <div class="group">
                    <label for="phone">Phone Number</label>
                    <input type="text" name="phone" id="phone">
                </div>
                
                <div class="group">
                    <label for="date">Select Date</label>
                    <input type="date" name="date" id="date">
                </div>
            
                <!-- Time picker for selecting time -->
                <div class="group">
                    <label for="time">Select Time</label>
                    <input type="time" name="time" id="time">
                </div>

    
                <div class="group">
                    <label for="city">Location</label>
                    <select name="city" id="city">
                        <option value="">Choose..</option>
                        <option value="">Mombasa Town</option>
                        <option value="">Nyali</option>
                        <option value="">Tudor</option>
                        <option value="">Mtwapa/Shanzu</option>
                        <option value="">Likoni</option>
                        <option value="">Bamburi</option>
                        <option value="">Miritini</option>
                        <option value="">Mikindani</option>
                        <option value="">Changamwe/Magongo/Port-Reiz</option>
                    </select>
                </div>
            </div>
            <div class="return">
                <div class="row">
                    <div>Total Quantity</div>
                    <div class="totalQuantity">70</div>
                </div>
                <div class="row">
                    <div>Total Price</div>
                    <div class="totalPrice">$900</div>
                </div>
            </div>
            <button class="buttonCheckout">CHECKOUT</button>
            </div>
    </div>
</div>


<script src="checkout.js"></script>

</body>
</html>
