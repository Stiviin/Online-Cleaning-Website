<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <link rel="stylesheet" href="payment.css">
</head>
<body>
  <div class="payment-container">
    <h1>Complete Your Payment</h1>
    <form id="payment-form">
      <label for="phone">Enter your phone number (format: 2547XXXXXXXX):</label>
      <input type="text" id="phone" name="phone" placeholder="254712345678" required pattern="2547\d{8}">
      
      <label for="amount">Amount to pay:</label>
      <input type="text" id="amount" name="amount" readonly>

      <input type="hidden" id="bookingId" name="bookingId">

      <div id="loading" style="display: none;">
        <p>Processing payment request...</p>
      </div>

      <button type="submit" id="submit-btn">Pay with M-Pesa</button>
    </form>
  </div>

  <script>
    // Get booking details from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount');
    const bookingId = urlParams.get('bookingId');

    // Populate the form fields
    document.getElementById('amount').value = `Ksh ${amount}`;
    document.getElementById('bookingId').value = bookingId;

    // Handle form submission
    document.getElementById('payment-form').addEventListener('submit', async (event) => {
  event.preventDefault();

  const phone = document.getElementById('phone').value;
  const amount = document.getElementById('amount').value.replace('Ksh ', '');
  const bookingId = document.getElementById('bookingId').value;
  const submitBtn = document.getElementById('submit-btn');
  const loading = document.getElementById('loading');

  // Validate phone format
  const phoneRegex = /^(?:254|\+254|0)?(7\d{8})$/;
  if (!phoneRegex.test(phone)) {
    alert('Invalid phone number format. Please use 2547XXXXXXXX, 07XXXXXXXX, or +2547XXXXXXXX');
    return;
  }

  // Normalize phone number to 254 format
  const normalizedPhone = phone.startsWith('254') ? phone : 
                         phone.startsWith('0') ? '254' + phone.substring(1) :
                         phone.startsWith('+254') ? phone.substring(1) :
                         '254' + phone;

  submitBtn.disabled = true;
  loading.style.display = 'block';

  try {
    const response = await fetch('/api/payments/stkpush', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ 
        phone: normalizedPhone,
        amount,
        bookingId 
      }),
    });

    const result = await response.json();
    
    if (!response.ok) {
      // Enhanced error display
      const errorMsg = result.details?.errorMessage || 
                      result.details?.message || 
                      result.error || 
                      'Payment failed';
      throw new Error(errorMsg);
    }

    alert('Payment request sent successfully! Please check your phone to complete the payment.');
    window.location.href = `/booking-confirmation.html?bookingId=${bookingId}`;
  } catch (error) {
    console.error('Payment error:', error);
    
    // More user-friendly error messages
    let displayError = error.message;
    if (error.message.includes('Request timeout')) {
      displayError = 'The payment request timed out. Please try again.';
    } else if (error.message.includes('Invalid Access Token')) {
      displayError = 'Payment service is currently unavailable. Please try again later.';
    }
    
    alert(`Payment Error: ${displayError}`);
  } finally {
    submitBtn.disabled = false;
    loading.style.display = 'none';
  }

  
});
    
  </script>
</body>
</html>
